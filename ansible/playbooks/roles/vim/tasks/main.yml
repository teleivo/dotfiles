# https://github.com/neovim/neovim/wiki/Building-Neovim#build-prerequisites
- name: Install pre-requisite packages
  become: true
  apt:
    pkg:
      - cmake
      - ninja-build
      - gettext
      - libtool
      - libtool-bin
      - autoconf
      - automake
      - g++
      - pkg-config
      - unzip
      - curl
      - luajit # required for luarocks.nvim plugin dependencies
      - luarocks # lua package manager required for luarocks.nvim
      - lua-check # lua linter
      - stow # required for linking the ~/.config/nvim
      - libclang-dev # required for building tree-sitter-cli via cargo

- name: Clone neovim
  git:
    repo: https://github.com/neovim/neovim
    dest: ~/code/neovim/neovim
    version: v0.12.0
    force: true
  register: neovim_changed

- name: Check if neovim is already installed
  stat:
    path: /usr/local/bin/nvim
  register: nvim_installed
  changed_when: false

- name: Build neovim
  import_tasks: build.yml
  when: neovim_changed.before != neovim_changed.after or not nvim_installed.stat.exists

- name: Check if tree-sitter-cli is already installed with correct version
  shell: |
    if command -v tree-sitter > /dev/null 2>&1 && tree-sitter --version | grep -q "{{ tree_sitter_version }}"; then
      echo "installed"
    else
      echo "not_installed"
    fi
  environment:
    PATH: "{{ ansible_env.HOME }}/.cargo/bin:{{ ansible_env.PATH }}"
  register: tree_sitter_version_check
  changed_when: false

- name: Install tree-sitter-cli
  command: cargo install tree-sitter-cli@{{ tree_sitter_version }}
  environment:
    PATH: "{{ ansible_env.HOME }}/.cargo/bin:{{ ansible_env.PATH }}"
  when: tree_sitter_version_check.stdout == "not_installed"

- name: Ensure config folder exists
  file:
    path: ~/.config/nvim
    state: directory

- name: Create symlinks into dotfiles
  command: stow --verbose --target ~/ nvim
  args:
    chdir: ~/code/dotfiles
  changed_when: false  # command module always shows changed; stow is idempotent, failures still detected via exit code

- name: Verify nvim is available before installing plugins
  stat:
    path: /usr/local/bin/nvim
  register: nvim_available
  changed_when: false

- name: Install and update plugins
  command: nvim --headless "+Lazy! sync" +qa
  when: nvim_available.stat.exists
